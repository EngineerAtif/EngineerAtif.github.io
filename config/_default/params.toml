colorScheme = "slate"
defaultAppearance = "dark"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true

mainSections = ["projects", "posts"]

[header]
  layout = "fixed"

[footer]
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[appearance]
  theme = "dark"
  enableApperanceEffects = true

[homepage]
  layout = "background"
  homepageImage = "img/hero-bg.jpg"
  showRecent = true
  showRecentItems = 6
  cardView = true
  layoutBackgroundBlur = true

[article]
  showDate = true
  showAuthor = true
  showHero = true
  heroStyle = "background"
  showBreadcrumbs = true
  showTableOfContents = true
  sharingLinks = ["linkedin", "twitter", "whatsapp"]

[list]
  showSummary = true
  groupByYear = true
  cardView = true
